<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1000" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="0.52" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9a9a93"/>
    </marker>
  </defs>

  <rect width="1000" height="640" rx="20" fill="#f6f5f1"/>

  <!-- Title -->
  <g transform="translate(372,26) scale(0.9)">
    <path d="M20 20 C 18 10.5 7.5 10.5 7.5 20 C 7.5 29.5 18 29.5 20 20 C 22 10.5 32.5 10.5 32.5 20 C 32.5 29.5 22 29.5 20 20 Z"
          fill="none" stroke="url(#g)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="20" cy="20" r="3" fill="url(#g)"/>
  </g>
  <text x="416" y="51" font-size="27" font-weight="700" fill="#0e0e0e">Mnemos Architecture</text>

  <!-- Browser -->
  <rect x="300" y="92" width="400" height="74" rx="16" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.6"/>
  <text x="500" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#0e0e0e">Browser · Next.js</text>
  <text x="500" y="144" text-anchor="middle" font-size="12.5" fill="#6b6b66">Chat · Memory drawer · Live agent stages</text>

  <line x1="500" y1="166" x2="500" y2="206" stroke="#9a9a93" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="516" y="191" font-size="11.5" font-weight="600" fill="#9a9a93">SSE stream</text>

  <!-- Orchestrator -->
  <rect x="250" y="210" width="500" height="170" rx="18" fill="#ffffff" stroke="url(#g)" stroke-width="2.6"/>
  <text x="500" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#0e0e0e">Orchestrator Agent</text>
  <g font-size="12.7" fill="#3a3a35">
    <text x="286" y="268">1 · Recall similar memories from Walrus</text>
    <text x="286" y="291">2 · Emit memory_selected (cosine score + reason)</text>
    <text x="286" y="314">3 · Research  →  Synthesize  (Zod-validated)</text>
    <text x="286" y="337">4 · Commit synthesis blob to Walrus</text>
    <text x="286" y="360">5 · Update vector index + registry pointer</text>
  </g>

  <!-- fan-out arrows -->
  <line x1="500" y1="380" x2="140" y2="428" stroke="#9a9a93" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="380" x2="380" y2="428" stroke="#9a9a93" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="380" x2="620" y2="428" stroke="#9a9a93" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="380" x2="860" y2="428" stroke="#9a9a93" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Service nodes -->
  <g>
    <rect x="36" y="430" width="208" height="98" rx="14" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.4"/>
    <circle cx="60" cy="458" r="5" fill="url(#g)"/>
    <text x="76" y="463" font-size="14.5" font-weight="700" fill="#0e0e0e">Researcher</text>
    <text x="60" y="490" font-size="11.5" fill="#6b6b66">Groq LLM</text>
    <text x="60" y="508" font-size="11.5" fill="#6b6b66">Structured JSON · Zod + retry</text>
  </g>
  <g>
    <rect x="276" y="430" width="208" height="98" rx="14" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.4"/>
    <circle cx="300" cy="458" r="5" fill="url(#g)"/>
    <text x="316" y="463" font-size="14.5" font-weight="700" fill="#0e0e0e">Synthesizer</text>
    <text x="300" y="490" font-size="11.5" fill="#6b6b66">Groq LLM</text>
    <text x="300" y="508" font-size="11.5" fill="#6b6b66">Cross-session · confidence Δ</text>
  </g>
  <g>
    <rect x="516" y="430" width="208" height="98" rx="14" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.4"/>
    <circle cx="540" cy="458" r="5" fill="url(#g)"/>
    <text x="556" y="463" font-size="14.5" font-weight="700" fill="#0e0e0e">Walrus REST</text>
    <text x="540" y="490" font-size="11.5" fill="#6b6b66">Publisher + aggregator</text>
    <text x="540" y="508" font-size="11.5" fill="#6b6b66">Content-addressed blobs</text>
  </g>
  <g>
    <rect x="756" y="430" width="208" height="98" rx="14" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.4"/>
    <circle cx="780" cy="458" r="5" fill="url(#g)"/>
    <text x="796" y="463" font-size="14.5" font-weight="700" fill="#0e0e0e">Voyage AI</text>
    <text x="780" y="490" font-size="11.5" fill="#6b6b66">voyage-3-lite</text>
    <text x="780" y="508" font-size="11.5" fill="#6b6b66">512-dim embeddings</text>
  </g>

  <!-- Persistence footer -->
  <rect x="36" y="558" width="928" height="54" rx="14" fill="#ffffff" stroke="#e6e4dc" stroke-width="1.4"/>
  <text x="500" y="582" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0e0e0e">Persistence</text>
  <text x="500" y="600" text-anchor="middle" font-size="11.8" fill="#6b6b66">Walrus stores the blobs and the vector index · data/registry.json keeps the pointer · the index rehydrates from Walrus on every restart</text>
</svg>
